# config/safety.yaml - OpenPaw Safety Checker 設定
# 設計書 Section 7 準拠

# 実行を完全に禁止するパターン（danger_level: 3、即中断）
blocklist:
  - "rm -rf /"
  - "rm -rf ~"
  - "sudo"
  - "su "
  - "dd "
  - "mkfs"
  - "> /dev/"
  - "chmod 777 /"

# danger_level: 2 として扱うコマンド prefix またはパターン
dangerous:
  - "rm"
  - "mv"
  - "chmod"
  - "chown"
  - "kill"
  - "killall"
  - "systemctl stop"
  - "systemctl disable"

# 操作を許可するパスプレフィックス（これ以外は拒否）
allowed_paths:
  - "/home/john"
  - "/tmp"

# 実行タイムアウト（秒）
timeout: 30

# D-Bus: 操作を完全に禁止するサービス（danger_level: 3、即中断）
# システムの根幹に触れる・シャットダウン系・ディスク破壊系を列挙
dbus_blocked_services:
  - "org.freedesktop.systemd1"    # systemd 直接操作
  - "org.freedesktop.login1"      # ログアウト・シャットダウン
  - "org.freedesktop.UDisks2"     # ディスクのフォーマット・マウント操作
  - "org.freedesktop.PolicyKit1"  # 権限昇格
  - "org.freedesktop.Hal"         # 旧来の HAL

# GUI: 実行を完全に禁止するキーコンビネーション（danger_level: 3、即中断）
gui_blocked_keys:
  - "ctrl+alt+Delete"       # SysRq / セッション終了
  - "ctrl+alt+BackSpace"    # Xサーバー強制終了（Debian デフォルト無効だが念のため）
  - "ctrl+alt+F1"           # VT切り替え
  - "ctrl+alt+F2"
  - "ctrl+alt+F3"

# GUI: danger_level: 2 として扱うキーコンビネーション
gui_dangerous_keys:
  - "super+l"               # 画面ロック（意図せずロックアウトを防ぐ）
  - "ctrl+alt"              # VT切り替え系のプレフィックス（上記ブロック以外）
